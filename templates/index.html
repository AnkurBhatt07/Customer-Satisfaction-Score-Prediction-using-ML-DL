{% extends 'base.html' %}
{% block body %}

<h2 class = "mb-3">Predict Customer CSAT Score</h2>
<form action="/predict" method = "POST" class="row g-3">

<!-- City -->
<select name="city" class="form-control">
    {% for v in data.cities %}
    <option>{{v}}</option>
    {% endfor %}
</select>

<!-- Product -->
<select name="product" class="form-control">
    {% for v in data.products %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>

<!-- Channel -->
<select name="channel" class="form-control">
    {% for v in data.channels %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select> 

<!-- Category -->
<select name="category" class="form-control">
    {% for v in data.categories %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>

<!-- Subcategory -->
<select name="subcategory" class="form-control">
    {% for v in data.sub_categories %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>

<!-- Agent -->
<select name="agent" class="form-control">
    {% for v in data.agents %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>

<!-- Supervisor -->
<select name="supervisor" class="form-control">
    {% for v in data.supervisors %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>

<!-- Manager -->
<select name="manager" class="form-control">
    {% for v in data.managers %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>

<!-- Tenure -->
<select name="tenure" class="form-control">
    {% for v in data.tenure_buckets %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>

<!-- Shift -->
<select name="shift" class="form-control">
    {% for v in data.shifts %}
    <option value="{{v}}">{{v}}</option>
    {% endfor %}
</select>


<!-- Price -->
<input type="text" name = 'price' class = "form-control" placeholder="Item Price">

<!-- Connected Time -->
<input type="text" name = 'connected_time' class = "form-control" placeholder="Connected handling time">

<!-- Remarks -->
<textarea name = 'remarks' class = 'form-control' placeholder = "Remarks"></textarea>

<!-- Timestamps -->
<input type="text" name = "order_time" class = "form-control" placeholder = "Order time dd/mm/yyyy HH:MM">
<input type="text" name = "issue_time" class = "form-control" placeholder = "Issue Reported time dd/mm/yyyy HH:MM">
<input type="text" name = 'reply_time' class = "form-control" placeholder = "Issue Responded Time">

<button class = "btn btn-primary mt-3">Predict</button>

</form>

{% endblock %}
